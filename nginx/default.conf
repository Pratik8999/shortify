server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/shrtfy.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shrtfy.in/privkey.pem;

    return 444;
}




server {
    listen 80;
    server_name shrtfy.in www.shrtfy.in;
    return 301 https://$host$request_uri;
}


server {

    listen 443 ssl;
    http2 on;

    server_name shrtfy.in www.shrtfy.in;

    ssl_certificate     /etc/letsencrypt/live/shrtfy.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shrtfy.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    # API
    location /api/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend FastAPI Admin
     location /admin/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Short URLs (EXACT 8 chars)
    location ~ ^/[A-Za-z0-9][A-Za-z0-9][A-Za-z0-9][A-Za-z0-9][A-Za-z0-9][A-Za-z0-9][A-Za-z0-9][A-Za-z0-9]$ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
