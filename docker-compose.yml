version: "3.9"

services:
  # Reverse proxy (A main gateway for routing requests)
  nginx:
    image: nginx:latest
    container_name: nginx_gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_build:/usr/share/nginx/html
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - app

      
  # React frontend
  frontend:
    image: pratik8999/url-shortner-frontend:latest
    container_name: url_shortener_frontend
    volumes:
    - frontend_build:/app/dist


  # FastAPI backend
  app:
    image: pratik8999/url-shortener-backend:latest
    container_name: url_shortener_app
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # PostgreSQL
  db:
    image: postgres:15
    container_name: url_shortener_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: url_shortener_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
  frontend_build:
